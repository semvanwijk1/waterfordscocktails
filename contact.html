<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Waterfords Cocktails</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header"></header>

    <main>
        <section class="hero" style="height: 60vh; background-image: url('images/hero-home.webp'); background-size: cover;">
            <div class="hero-content reveal">
                <h1>CONTACT</h1>
                <p>Let's talk cocktails</p>
            </div>
        </section>

        <section class="container reveal" style="padding: 100px 20px;">
            <div class="contact-container">
                <!-- Formulier -->
                <div class="glass-card">
                    <h2>Stuur een bericht</h2>
                    <br>
                    <!-- VERVANG DE URL HIERONDER DOOR JE EIGEN FORMSPREE URL -->
                    <form action="https://formspree.io/f/JOUW_ID_HIER" method="POST">
                        <input type="text" name="name" placeholder="Naam" required>
                        <input type="email" name="email" placeholder="E-mail" required>
                        <textarea name="message" rows="5" placeholder="Bericht" required></textarea>
                        
                        <!-- Honeypot voor spam -->
                        <input type="text" name="_gotcha" style="display:none">
                        
                        <button type="submit" class="btn-modern">VERSTUUR</button>
                    </form>
                </div>

                <!-- Info & Map -->
                <div class="reveal">
                    <div class="glass-card">
                        <h3>Locatie</h3>
                        <p>Hoge Zand 39, 2512 EL 's-Gravenhage</p>
                        <p>info@waterfordscocktails.com</p>
                        <br>
                        <iframe 
                            class="map-frame"
                            width="100%" 
                            height="300" 
                            frameborder="0" 
                            src="https://maps.google.com/maps?q=Hoge%20Zand%2039,%20Den%20Haag&t=&z=15&ie=UTF8&iwloc=&output=embed">
                        </iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer"></footer>
    <script src="js/script.js"></script>
</body>
</html>
