<!-- ... (head sectie gelijk aan index.html) ... -->
<main style="padding-top: 100px;">
    <section class="container">
        <h1 class="text-center">Contact</h1>
        
        <form action="https://formspree.io/f/JOUW_ID_HIER" method="POST" class="contact-form">
            <!-- Honeypot om spam te voorkomen -->
            <input type="text" name="_gotcha" style="display:none">
            
            <input type="text" name="name" placeholder="Naam" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <textarea name="message" rows="5" placeholder="Uw bericht" required></textarea>
            <button type="submit" class="btn" data-i18n="send">Versturen</button>
        </form>

        <div class="map-container" style="margin-top: 50px;">
            <iframe 
                width="100%" 
                height="450" 
                style="border:0" 
                loading="lazy" 
                allowfullscreen 
                src="https://www.google.com/maps/embed/v1/place?key=GEEN_API_NODIG_VOOR_EMBED&q=Hoge+Zand+39,s-Gravenhage">
            </iframe>
            <!-- Let op: Voor een iframe zonder API gebruik je de 'Share > Embed' link van Google Maps zelf -->
        </div>
    </section>
</main>
<!-- ... (footer en script) ... -->
